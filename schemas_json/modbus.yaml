$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "hat-gateway://modbus.yaml"
title: Modbus devices
$defs:
    master:
        type: object
        title: Modbus master
        required:
            - name
            - connection
            - remote_devices
        properties:
            name:
                type: string
            connection:
                type: object
                required:
                    - modbus_type
                    - transport
                    - connect_timeout
                    - connect_delay
                    - request_timeout
                    - request_delay
                    - request_retry_immediate_count
                    - request_retry_delayed_count
                    - request_retry_delay
                properties:
                    modbus_type:
                        description: |
                            Modbus message encoding type
                        enum:
                            - TCP
                            - RTU
                            - ASCII
                    transport:
                        oneOf:
                          - type: object
                            required:
                                - type
                                - host
                                - port
                            properties:
                                type:
                                    const: TCP
                                host:
                                    type: string
                                    description: |
                                        Remote host name
                                port:
                                    type: integer
                                    description: |
                                        Remote host TCP port
                                    default: 502
                          - type: object
                            required:
                                - type
                                - port
                                - baudrate
                                - bytesize
                                - parity
                                - stopbits
                                - flow_control
                                - silent_interval
                            properties:
                                type:
                                    const: SERIAL
                                port:
                                    type: string
                                    description: |
                                        Serial port name (e.g. /dev/ttyS0)
                                baudrate:
                                    type: integer
                                    description: |
                                        Baud rate (e.g. 9600)
                                bytesize:
                                    description: |
                                        Number of data bits
                                    enum:
                                        - FIVEBITS
                                        - SIXBITS
                                        - SEVENBITS
                                        - EIGHTBITS
                                parity:
                                    description: |
                                        Parity checking
                                    enum:
                                        - NONE
                                        - EVEN
                                        - ODD
                                        - MARK
                                        - SPACE
                                stopbits:
                                    description: |
                                        Number of stop bits
                                    enum:
                                        - ONE
                                        - ONE_POINT_FIVE
                                        - TWO
                                flow_control:
                                    type: object
                                    required:
                                        - xonxoff
                                        - rtscts
                                        - dsrdtr
                                    properties:
                                        xonxoff:
                                            type: boolean
                                            description: |
                                                Enable software flow control
                                        rtscts:
                                            type: boolean
                                            description: |
                                                Enable hardware (RTS/CTS) flow control
                                        dsrdtr:
                                            type: boolean
                                            description: |
                                                Enable hardware (DSR/DTR) flow control
                                silent_interval:
                                    type: number
                                    description: |
                                        Serial communication silent interval
                    connect_timeout:
                        type: number
                        description: |
                            Maximum number of seconds available to single connection
                            attempt
                    connect_delay:
                        type: number
                        description: |
                            Delay (in seconds) between two consecutive connection
                            establishment attempts
                    request_timeout:
                        type: number
                        description: |
                            Maximum duration (in seconds) of read or write
                            request/response exchange.
                    request_delay:
                        type: number
                        description: |
                            Delay (in seconds) between two consecutive requests
                            (minimal duration between response and next request)
                    request_retry_immediate_count:
                        type: integer
                        description: |
                            Number of immediate request retries before remote
                            data is considered unavailable. Total number
                            of retries is request_retry_immediate_count *
                            request_retry_delayed_count.
                    request_retry_delayed_count:
                        type: integer
                        description: |
                            Number of delayed request retries before remote data
                            is considered unavailable. Total number
                            of retries is request_retry_immediate_count *
                            request_retry_delayed_count.
                    request_retry_delay:
                        type: number
                        description: |
                            Delay (in seconds) between two consecutive delayed
                            request retries
            remote_devices:
                type: array
                items:
                    type: object
                    required:
                        - device_id
                        - timeout_poll_delay
                        - data
                    properties:
                        device_id:
                            type: integer
                            description: |
                                Modbus device identifier
                        timeout_poll_delay:
                            type: number
                            description: |
                                Delay (in seconds) after read timeout and
                                before device polling is resumed
                        data:
                            type: array
                            items:
                                type: object
                                required:
                                    - name
                                    - interval
                                    - data_type
                                    - start_address
                                    - bit_offset
                                    - bit_count
                                properties:
                                    name:
                                        type: string
                                        description: |
                                            Data point name
                                    interval:
                                        type:
                                            - number
                                            - "null"
                                        description: |
                                            Polling interval in seconds or
                                            null if polling is disabled
                                    data_type:
                                        description: |
                                            Modbus register type
                                        enum:
                                            - COIL
                                            - DISCRETE_INPUT
                                            - HOLDING_REGISTER
                                            - INPUT_REGISTER
                                            - QUEUE
                                    start_address:
                                        type: integer
                                        description: |
                                            Starting address of modbus register
                                    bit_offset:
                                        type: integer
                                        description: |
                                            Bit offset (number of bits skipped)
                                    bit_count:
                                        type: integer
                                        description: |
                                            Number of bits used for
                                            encoding/decoding value (not
                                            including offset bits)
    slave:
        type: object
        required:
            - name
            - modbus_type
            - transport
            - data
        properties:
            name:
                type: string
            modbus_type:
                description: |
                    Modbus message encoding type
                enum:
                    - TCP
                    - RTU
                    - ASCII
            transport:
                oneOf:
                  - type: object
                    required:
                        - type
                        - local_host
                        - local_port
                        - remote_hosts
                        - max_connections
                        - keep_alive_timeout
                    properties:
                        type:
                            const: TCP
                        local_host:
                            type: string
                            description: |
                                Local host name
                        local_port:
                            type: integer
                            description: |
                                Local host TCP port
                            default: 502
                        remote_hosts:
                            type:
                                - array
                                - "null"
                            description: |
                                if null, all remote hosts are allowed
                            items:
                                type: string
                        max_connections:
                            type:
                                - "null"
                                - integer
                        keep_alive_timeout:
                            type:
                                - number
                                - "null"
                  - type: object
                    required:
                        - type
                        - port
                        - baudrate
                        - bytesize
                        - parity
                        - stopbits
                        - flow_control
                        - silent_interval
                        - keep_alive_timeout
                    properties:
                        type:
                            const: SERIAL
                        port:
                            type: string
                            description: |
                                Serial port name (e.g. /dev/ttyS0)
                        baudrate:
                            type: integer
                            description: |
                                Baud rate (e.g. 9600)
                        bytesize:
                            description: |
                                Number of data bits
                            enum:
                                - FIVEBITS
                                - SIXBITS
                                - SEVENBITS
                                - EIGHTBITS
                        parity:
                            description: |
                                Parity checking
                            enum:
                                - NONE
                                - EVEN
                                - ODD
                                - MARK
                                - SPACE
                        stopbits:
                            description: |
                                Number of stop bits
                            enum:
                                - ONE
                                - ONE_POINT_FIVE
                                - TWO
                        flow_control:
                            type: object
                            required:
                                - xonxoff
                                - rtscts
                                - dsrdtr
                            properties:
                                xonxoff:
                                    type: boolean
                                    description: |
                                        Enable software flow control
                                rtscts:
                                    type: boolean
                                    description: |
                                        Enable hardware (RTS/CTS) flow control
                                dsrdtr:
                                    type: boolean
                                    description: |
                                        Enable hardware (DSR/DTR) flow control
                        silent_interval:
                            type: number
                            description: |
                                Serial communication silent interval
                        keep_alive_timeout:
                            type: number
            data:
                type: array
                items:
                    type: object
                    required:
                        - name
                        - device_id
                        - data_type
                        - start_address
                        - bit_offset
                        - bit_count
                    properties:
                        name:
                            type: string
                            description: |
                                Data point name
                        device_id:
                            type: integer
                        data_type:
                            description: |
                                Modbus register type
                            enum:
                                - COIL
                                - DISCRETE_INPUT
                                - HOLDING_REGISTER
                                - INPUT_REGISTER
                                - QUEUE
                        start_address:
                            type: integer
                            description: |
                                Starting address of modbus register
                        bit_offset:
                            type: integer
                            description: |
                                Bit offset (number of bits skipped)
                        bit_count:
                            type: integer
                            description: |
                                Number of bits used for
                                encoding/decoding value (not
                                including offset bits)
    events:
        master:
            gateway:
                status:
                    enum:
                        - DISCONNECTED
                        - CONNECTING
                        - CONNECTED
                remote_device_status:
                    enum:
                        - DISABLED
                        - CONNECTING
                        - CONNECTED
                        - DISCONNECTED
                read:
                    type: object
                    required:
                        - result
                    properties:
                        result:
                            enum:
                                - SUCCESS
                                - INVALID_FUNCTION_CODE
                                - INVALID_DATA_ADDRESS
                                - INVALID_DATA_VALUE
                                - FUNCTION_ERROR
                                - GATEWAY_PATH_UNAVAILABLE
                                - GATEWAY_TARGET_DEVICE_FAILED_TO_RESPOND
                        value:
                            type: integer
                        cause:
                            enum:
                                - INTERROGATE
                                - CHANGE
                write:
                    type: object
                    required:
                        - request_id
                        - result
                    properties:
                        request_id:
                            type: string
                        result:
                            enum:
                                - SUCCESS
                                - INVALID_FUNCTION_CODE
                                - INVALID_DATA_ADDRESS
                                - INVALID_DATA_VALUE
                                - FUNCTION_ERROR
                                - GATEWAY_PATH_UNAVAILABLE
                                - GATEWAY_TARGET_DEVICE_FAILED_TO_RESPOND
                                - TIMEOUT
            system:
                enable:
                    type: boolean
                write:
                    type: object
                    required:
                        - request_id
                        - value
                    properties:
                        request_id:
                            type: string
                        value:
                            type: integer
        slave:
            gateway:
                connections:
                    type: array
                    items:
                        oneOf:
                          - type: object
                            required:
                                - type
                                - connection_id
                            properties:
                                type:
                                    const: SERIAL
                                connection_id:
                                    type: integer
                          - type: object
                            required:
                                - type
                                - connection_id
                                - local
                                - remote
                            properties:
                                type:
                                    const: TCP
                                connection_id:
                                    type: integer
                                local:
                                    type: object
                                    required:
                                        - host
                                        - port
                                    properties:
                                        host:
                                            type: string
                                        port:
                                            type: integer
                                remote:
                                    type: object
                                    required:
                                        - host
                                        - port
                                    properties:
                                        host:
                                            type: string
                                        port:
                                            type: integer
                write:
                    type: object
                    required:
                        - request_id
                        - connection_id
                        - data
                    properties:
                        request_id:
                            type: string
                        connection_id:
                            type: integer
                        data:
                            type: array
                            items:
                                type: object
                                required:
                                    - name
                                    - value
                                properties:
                                    name:
                                        type: string
                                    value:
                                        type: integer
            system:
                data:
                    type: object
                    required:
                        - value
                    properties:
                        value:
                            type: integer
                write:
                    type: object
                    required:
                        - request_id
                        - success
                    properties:
                        request_id:
                            type: string
                        success:
                            type: boolean
